name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install selenium webdriver-manager pyinstaller
    - run: pyinstaller --onefile --windowed --name "Automator_Pro" main.py
    - uses: actions/upload-artifact@v3
      with:
        name: Automator_Pro
        path: dist/Automator_Pro.exe
