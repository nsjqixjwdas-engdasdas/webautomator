name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install selenium webdriver-manager pyinstaller
    - run: pip install --upgrade pyinstaller
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --collect-all selenium --collect-all webdriver_manager --name "Automator_Pro" main.py
    - uses: actions/upload-artifact@v4
      with:
        name: Automator_Pro
        path: dist/Automator_Pro.exe
